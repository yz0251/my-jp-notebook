<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일본어 독학 노트</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Noto+Sans+KR:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#f5f6fa; --surface:#ffffff; --border:#e2e4ec;
            --text:#1e1f2e; --muted:#9395a5; --accent:#6c63ff; --expense:#f43f5e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Nunito','Noto Sans KR','Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
        
        /* Layout */
        #mainScreen, #editScreen { display: none; flex-direction: column; height: 100vh; }
        .topbar { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--accent); }

        /* Main Grid */
        .main-grid { display: grid; grid-template-columns: 300px 1fr 350px; flex: 1; overflow: hidden; background: var(--border); gap: 1px; }
        .panel { background: var(--surface); display: flex; flex-direction: column; overflow: hidden; }
        .panel-head { padding: 15px; border-bottom: 1px solid var(--border); font-weight: 700; background: #fafaff; display: flex; justify-content: space-between; align-items: center; }

        /* List Items */
        .list-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .list-item:hover { background: #f8f9ff; }
        .list-item.active { background: #f0f1ff; border-left: 4px solid var(--accent); }
        .list-item .title { font-weight: 700; margin-bottom: 5px; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .list-item .date { font-size: 0.75rem; color: var(--muted); }

        /* Viewer */
        .viewer { padding: 40px; overflow-y: auto; flex: 1; }
        .viewer h2 { margin-bottom: 25px; font-size: 1.6rem; color: var(--text); }
        .jp-text { font-size: 1.3rem; line-height: 2.3; margin-bottom: 40px; white-space: pre-wrap; color: #2c3e50; }
        .ko-text { color: #7f8c8d; border-top: 1px dashed var(--border); padding-top: 25px; line-height: 1.8; white-space: pre-wrap; font-size: 1.05rem; }

        /* Vocab List */
        .vocab-list { flex: 1; overflow-y: auto; padding: 15px; }
        .vocab-card { padding: 15px; background: #f9f9ff; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; }
        .vocab-word { font-weight: 800; color: var(--accent); font-size: 1.1rem; margin-bottom: 6px; }
        .vocab-sent { font-size: 0.85rem; color: #555; line-height: 1.5; }

        /* Edit Screen Form */
        .edit-container { flex: 1; overflow-y: auto; padding: 40px 20px; background: var(--bg); display: flex; justify-content: center; }
        .edit-card { background: var(--surface); width: 100%; max-width: 900px; padding: 40px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.05); height: fit-content; }
        .form-section { margin-bottom: 30px; }
        .form-label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 0.9rem; color: var(--text); }
        .form-control { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 1rem; outline: none; transition: 0.2s; }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1); }
        
        /* Dynamic Vocab Row */
        .vocab-row { display: grid; grid-template-columns: 200px 1fr 40px; gap: 10px; margin-bottom: 10px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* Buttons */
        .btn { padding: 10px 22px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; font-family: inherit; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
        .btn-ghost:hover { background: #f8f9ff; color: var(--text); }
        .btn-danger { background: #fff1f2; color: var(--expense); border: 1px solid #fee2e2; }
        .btn-danger:hover { background: #fee2e2; }
    </style>
</head>
<body>

<div id="mainScreen" style="display: flex;">
    <div class="topbar">
        <div class="logo">📒 일본어 학습장</div>
        <button class="btn btn-primary" onclick="goEdit()">+ 새 기사 작성</button>
    </div>

    <div class="main-grid">
        <div class="panel">
            <div class="panel-head">학습 목록</div>
            <div id="articleList" style="overflow-y:auto; flex:1;"></div>
        </div>

        <div class="panel">
            <div class="panel-head">학습 본문</div>
            <div id="viewer" class="viewer">
                <div style="text-align:center; color:var(--muted); margin-top:100px;">기사를 선택하거나 새로 작성해 주세요.</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-head">단어장</div>
            <div id="vocabList" class="vocab-list"></div>
        </div>
    </div>
</div>

<div id="editScreen">
    <div class="topbar">
        <div class="logo" onclick="goMain()" style="cursor:pointer">🔙 뒤로가기</div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-ghost" onclick="goMain()">취소</button>
            <button class="btn btn-primary" onclick="saveData()">등록 완료</button>
        </div>
    </div>

    <div class="edit-container">
        <div class="edit-card">
            <h2 style="margin-bottom:30px;">새 학습 데이터 등록</h2>
            
            <div class="form-section">
                <label class="form-label">기사 제목</label>
                <input type="text" id="editTitle" class="form-control" placeholder="예: NHK 뉴스 - 일본의 날씨 변화">
            </div>

            <div class="form-section" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div>
                    <label class="form-label">일본어 본문</label>
                    <textarea id="editJp" class="form-control" style="height:250px; line-height:1.6;" placeholder="일본어 원문을 입력하세요..."></textarea>
                </div>
                <div>
                    <label class="form-label">한국어 해석</label>
                    <textarea id="editKo" class="form-control" style="height:250px; line-height:1.6;" placeholder="해석을 입력하세요..."></textarea>
                </div>
            </div>

            <hr style="border:none; border-top:1px solid var(--border); margin:40px 0;">

            <div class="form-section">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <label class="form-label" style="margin-bottom:0;">공부하고 싶은 단어 기록</label>
                    <button class="btn btn-ghost" style="padding:5px 12px; font-size:0.8rem;" onclick="addVocabRow()">+ 단어 칸 추가</button>
                </div>
                <div id="vocabInputs">
                    </div>
            </div>
        </div>
    </div>
</div>

<script>
    let articles = JSON.parse(localStorage.getItem('my_articles') || '[]');
    let vocabulary = JSON.parse(localStorage.getItem('my_vocabulary') || '[]');
    let currentArticleId = null;

    // 화면 전환
    function goEdit() {
        document.getElementById('mainScreen').style.display = 'none';
        document.getElementById('editScreen').style.display = 'flex';
        // 폼 초기화
        document.getElementById('editTitle').value = '';
        document.getElementById('editJp').value = '';
        document.getElementById('editKo').value = '';
        document.getElementById('vocabInputs').innerHTML = '';
        addVocabRow(); // 기본 한 줄 추가
    }

    function goMain() {
        document.getElementById('editScreen').style.display = 'none';
        document.getElementById('mainScreen').style.display = 'flex';
        renderArticles();
        renderVocab();
    }

    // 단어 입력 줄 추가
    function addVocabRow() {
        const div = document.createElement('div');
        div.className = 'vocab-row';
        div.innerHTML = `
            <input type="text" class="form-control voc-w" placeholder="단어">
            <input type="text" class="form-control voc-s" placeholder="문장 속 쓰임">
            <button class="btn btn-danger" style="padding:0;" onclick="this.parentElement.remove()">✕</button>
        `;
        document.getElementById('vocabInputs').appendChild(div);
    }

    // 데이터 저장
    function saveData() {
        const title = document.getElementById('editTitle').value.trim();
        const jp = document.getElementById('editJp').value.trim();
        const ko = document.getElementById('editKo').value.trim();
        const artId = Date.now();

        if(!title || !jp) return alert('제목과 본문은 필수입니다.');

        // 1. 기사 저장
        const newArt = { id: artId, title, jp, ko, date: new Date().toLocaleDateString() };
        articles.unshift(newArt);
        localStorage.setItem('my_articles', JSON.stringify(articles));

        // 2. 단어 저장
        const rows = document.querySelectorAll('.vocab-row');
        rows.forEach(row => {
            const word = row.querySelector('.voc-w').value.trim();
            const sent = row.querySelector('.voc-s').value.trim();
            if(word) {
                vocabulary.unshift({ id: Date.now() + Math.random(), word, sent, articleId: artId });
            }
        });
        localStorage.setItem('my_vocabulary', JSON.stringify(vocabulary));

        goMain();
        selectArticle(artId);
    }

    // 렌더링 함수들
    function renderArticles() {
        const list = document.getElementById('articleList');
        if(articles.length === 0) {
            list.innerHTML = '<div style="padding:20px; color:var(--muted); font-size:0.85rem; text-align:center;">작성된 기사가 없습니다.</div>';
            return;
        }
        list.innerHTML = articles.map(a => `
            <div class="list-item ${currentArticleId === a.id ? 'active' : ''}" onclick="selectArticle(${a.id})">
                <div class="title">${a.title}</div>
                <div class="date">${a.date}</div>
            </div>
        `).join('');
    }

    function selectArticle(id) {
        currentArticleId = id;
        const art = articles.find(a => a.id === id);
        if(!art) return;

        renderArticles();
        document.getElementById('viewer').innerHTML = `
            <h2>${art.title}</h2>
            <div class="jp-text">${art.jp}</div>
            <div class="ko-text">${art.ko}</div>
        `;
        renderVocab();
    }

    function renderVocab() {
        const list = document.getElementById('vocabList');
        // 현재 선택된 기사에 해당하는 단어만 필터링해서 보여줌
        const filtered = vocabulary.filter(v => v.articleId === currentArticleId);
        
        if (filtered.length === 0) {
            list.innerHTML = '<div style="padding:20px; color:var(--muted); font-size:0.85rem; text-align:center;">이 기사에 등록된 단어가 없습니다.</div>';
            return;
        }
        list.innerHTML = filtered.map(v => `
            <div class="vocab-card">
                <div class="vocab-word">${v.word}</div>
                <div class="vocab-sent">${v.sent}</div>
            </div>
        `).join('');
    }

    // 초기 로드
    window.onload = () => {
        renderArticles();
        if(articles.length > 0) selectArticle(articles[0].id);
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일본어 독학 노트</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Noto+Sans+KR:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#f5f6fa; --surface:#ffffff; --border:#e2e4ec;
            --text:#1e1f2e; --muted:#9395a5; --accent:#6c63ff; --danger:#f43f5e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Nunito','Noto Sans KR','Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
        
        #mainScreen, #editScreen, #vocabScreen { display: none; flex-direction: column; height: 100vh; }
        .topbar { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--accent); cursor: pointer; }

        .main-grid { display: grid; grid-template-columns: 320px 1fr; flex: 1; overflow: hidden; background: var(--border); gap: 1px; }
        .panel { background: var(--surface); display: flex; flex-direction: column; overflow: hidden; }
        .panel-head { padding: 15px; border-bottom: 1px solid var(--border); font-weight: 700; background: #fafaff; display: flex; justify-content: space-between; align-items: center; }

        .list-item { padding: 18px 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; position: relative; }
        .list-item:hover { background: #f8f9ff; }
        .list-item.active { background: #f0f1ff; border-left: 4px solid var(--accent); }
        .list-item .title { font-weight: 700; font-size: 0.95rem; padding-right: 70px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .list-item .date { font-size: 0.8rem; color: var(--muted); margin-top: 5px; }
        .list-item-btns { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); display: none; gap: 8px; background: inherit; padding-left: 10px; }
        .list-item:hover .list-item-btns { display: flex; }

        .viewer { padding: 50px 60px; overflow-y: auto; flex: 1; }
        .viewer h2 { font-size: 1.8rem; color: var(--text); line-height: 1.4; margin-bottom: 15px; }
        .title-trans { color: var(--muted); font-size: 1.15rem; margin-bottom: 50px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
        .sentence-pair { margin-bottom: 35px; }
        .viewer-jp { font-size: 1.45rem; line-height: 2.2; color: #2c3e50; margin-bottom: 8px; font-family: 'Noto Sans JP', sans-serif; }
        .viewer-ko { font-size: 1.05rem; color: #888; line-height: 1.6; }

        .highlight-word { border-bottom: 2px dashed var(--accent); cursor: help; color: var(--accent); font-weight: 700; }
        rt { font-family: 'Noto Sans JP', sans-serif; font-size: 0.55em; color: var(--accent); font-weight: 400; }

        .full-container { flex: 1; overflow-y: auto; padding: 40px 20px; background: var(--bg); display: flex; flex-direction: column; align-items: center; }
        .full-card { background: var(--surface); width: 100%; max-width: 1000px; padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        .sentence-row { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 20px; margin-bottom: 25px; background: #fff; padding: 20px; border-radius: 14px; border: 1px solid var(--border); }
        .sent-text { height: 120px !important; }

        .vocab-row-container { display: grid; grid-template-columns: 1fr 40px; gap: 10px; margin-bottom: 25px; background: #fcfcff; padding: 20px; border-radius: 14px; border: 1px solid #eee; }
        .vocab-inputs-grid { display: flex; flex-direction: column; gap: 12px; }
        .vocab-input-line { display: grid; grid-template-columns: 220px 1fr; gap: 15px; }

        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; margin-top: 25px; }
        .vocab-card { padding: 25px; background: #fff; border: 1px solid var(--border); border-radius: 16px; position: relative; }
        .vocab-word { font-weight: 800; color: var(--accent); font-size: 1.3rem; margin-bottom: 5px; }
        .vocab-mean { font-weight: 700; color: #444; font-size: 1.1rem; }
        
        /* 예문 보기 버튼 스타일 */
        .btn-ex-pop { position: absolute; top: 20px; right: 20px; font-size: 0.75rem; padding: 4px 10px; border-radius: 6px; background: #f0f0ff; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; transition: 0.2s; font-weight: 700; }
        .btn-ex-pop:hover { background: var(--accent); color: #fff; }

        /* 팝업(모달) 스타일 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 2000; animation: fadeIn 0.2s; }
        .modal-box { background: white; width: 90%; max-width: 500px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; }
        .modal-word-title { font-size: 1.4rem; font-weight: 800; color: var(--accent); margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-ex-jp { font-size: 1.2rem; line-height: 1.6; color: #2c3e50; margin-bottom: 10px; font-family: 'Noto Sans JP', sans-serif; }
        .modal-ex-ko { font-size: 1rem; color: #7f8c8d; line-height: 1.5; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #ccc; }

        .btn-del-icon { background: none; border: none; color: #ddd; cursor: pointer; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; }
        .btn-del-icon:hover { color: var(--danger); }
        .form-control { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 1rem; outline: none; background: #fcfcff; transition: 0.2s; }
        .btn { padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
        .btn-sm-action { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px; cursor: pointer; font-size: 0.9rem; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="modal-overlay" id="exampleModal" onclick="closeExModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeExModal(event)">✕</span>
        <div class="modal-word-title" id="modalTitle">단어</div>
        <div class="modal-ex-jp" id="modalExJp">일본어 예문이 들어갑니다.</div>
        <div class="modal-ex-ko" id="modalExKo">한국어 해석이 들어갑니다.</div>
    </div>
</div>

<div id="mainScreen" style="display: flex;">
    <div class="topbar">
        <div class="logo" onclick="location.reload()">📒 일본어 학습장</div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-ghost" onclick="goVocab()">📖 단어장</button>
            <button class="btn btn-primary" onclick="goEdit()">+ 새 기사 작성</button>
        </div>
    </div>
    <div class="main-grid">
        <div class="panel"><div class="panel-head">학습 목록</div><div id="articleList" style="overflow-y:auto; flex:1;"></div></div>
        <div class="panel"><div class="panel-head">학습 본문</div><div id="viewer" class="viewer"></div></div>
    </div>
</div>

<div id="editScreen">
    <div class="topbar">
        <div class="logo" onclick="goMain()">🔙 뒤로가기</div>
        <button class="btn btn-primary" onclick="saveData()">저장 완료</button>
    </div>
    <div class="full-container">
        <div class="full-card">
            <h2 style="margin-bottom:30px;">기사 등록 및 수정</h2>
            <div style="display:flex; flex-direction:column; gap:15px; margin-bottom:35px;">
                <input type="text" id="editTitle" class="form-control" style="font-weight:bold; font-size:1.15rem;" placeholder="기사 제목 - 요미가나는 한자[히라가나] 형식">
                <input type="text" id="editTitleKo" class="form-control" placeholder="제목 뜻 (한국어)">
            </div>
            <p style="margin-bottom:15px; font-weight:bold; color:var(--accent); font-size:1.1rem;">본문 입력 (문장별 대조)</p>
            <div id="sentenceInputs"></div>
            <button class="btn btn-ghost" style="width:100%; margin-bottom:45px;" onclick="addSentenceRow()">+ 문장 추가</button>
            <hr style="border:none; border-top:1px solid var(--border); margin:40px 0;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <p style="font-weight:bold; color:var(--accent); font-size:1.1rem;">단어 기록 (*이 기사 뜻* 표시)</p>
                <button class="btn btn-ghost" style="padding:8px 18px; font-size:0.9rem;" onclick="addVocabRow()">+ 단어 추가</button>
            </div>
            <div id="vocabInputs"></div>
        </div>
    </div>
</div>

<div id="vocabScreen">
    <div class="topbar">
        <div class="logo" onclick="goMain()">🔙 메인으로</div>
        <div style="font-weight:bold; color:var(--accent);">일본어 가나다순 정렬</div>
    </div>
    <div class="full-container">
        <div class="full-card">
            <h2>전체 단어장 <span id="vocabCount" style="font-size:1.1rem; color:var(--muted); font-weight:normal;"></span></h2>
            <div id="fullVocabList" class="vocab-grid"></div>
        </div>
    </div>
</div>

<script>
    let articles = JSON.parse(localStorage.getItem('my_articles') || '[]');
    let vocabulary = JSON.parse(localStorage.getItem('my_vocabulary') || '[]');
    let currentArticleId = null;
    let isEditMode = false;
    let editingId = null;

    function goMain() { document.getElementById('editScreen').style.display='none'; document.getElementById('vocabScreen').style.display='none'; document.getElementById('mainScreen').style.display='flex'; renderArticles(); }
    function goEdit(id = null) {
        document.getElementById('mainScreen').style.display='none'; document.getElementById('editScreen').style.display='flex';
        document.getElementById('sentenceInputs').innerHTML=''; document.getElementById('vocabInputs').innerHTML='';
        if (id) {
            isEditMode=true; editingId=id;
            const art=articles.find(a=>a.id===id);
            document.getElementById('editTitle').value=art.title; document.getElementById('editTitleKo').value=art.titleKo||'';
            art.jp.split('\n').forEach((v,i)=>addSentenceRow(v, art.ko.split('\n')[i]||''));
            vocabulary.filter(v=>v.articleId===id).forEach(v=>addVocabRow(v.word, v.mean, v.sent));
        } else { isEditMode=false; editingId=null; document.getElementById('editTitle').value=''; document.getElementById('editTitleKo').value=''; addSentenceRow(); addVocabRow(); }
    }
    function goVocab() { document.getElementById('mainScreen').style.display='none'; document.getElementById('vocabScreen').style.display='flex'; renderFullVocab(); }

    function processJapaneseText(text, vocabList) {
        if (!text) return "";
    
        // 1. {대상글자}[요미가나] 형식을 <ruby> 태그로 변환
        // 이 로직이 적용되면 {五輪}[ごりん] 이 五輪(위에 ごりん 표시)으로 바뀝니다.
        let processed = text.replace(/\{([^{}]+)\}\[([^\[\]]+)\]/g, '<ruby>$1<rt>$2</rt></ruby>');
        
        // 2. 단어장 매칭 (호버 시 뜻 표시)
        if (vocabList && vocabList.length > 0) {
            vocabList.forEach(v => {
                // 단어 뜻에 *별표*로 감싼 핵심 뜻이 있는지 확인
                const match = v.mean.match(/\*([^*]+)\*/);
                if (match) {
                    const primaryMean = match[1];
                    // 이미 변환된 루비 태그(<rt>) 안의 글자는 건드리지 않도록 정규식 설정
                    const regex = new RegExp(`(${v.word})(?![^<]*>|[^<>]*<\/rt>)`, 'g');
                    processed = processed.replace(regex, `<span class="highlight-word" title="${primaryMean}">$1</span>`);
                }
            });
        }
        return processed;
    }

    function openExModal(word, jp, ko) {
        document.getElementById('modalTitle').innerText = word;
        document.getElementById('modalExJp').innerText = jp;
        document.getElementById('modalExKo').innerText = ko;
        document.getElementById('exampleModal').style.display = 'flex';
    }
    function closeExModal(e) { document.getElementById('exampleModal').style.display = 'none'; }

    function addSentenceRow(jp='', ko='') {
        const div=document.createElement('div'); div.className='sentence-row';
        div.innerHTML=`<textarea class="form-control sent-jp sent-text">${jp}</textarea><textarea class="form-control sent-ko sent-text">${ko}</textarea><button class="btn-del-icon" onclick="this.parentElement.remove()">✕</button>`;
        document.getElementById('sentenceInputs').appendChild(div);
    }
    function addVocabRow(word='', mean='', sent='') {
        const div=document.createElement('div'); div.className='vocab-row-container';
        const [vS, vT]=sent.split(' | ');
        div.innerHTML=`<div class="vocab-inputs-grid"><div class="vocab-input-line"><input type="text" class="form-control voc-w" value="${word}"><input type="text" class="form-control voc-s" value="${vS||''}"></div><div class="vocab-input-line"><input type="text" class="form-control voc-m" value="${mean}"><input type="text" class="form-control voc-t" value="${vT||''}"></div></div><button class="btn-del-icon" onclick="this.parentElement.parentElement.remove()">✕</button>`;
        document.getElementById('vocabInputs').appendChild(div);
    }

    function saveData() {
        const title=document.getElementById('editTitle').value.trim(); const titleKo=document.getElementById('editTitleKo').value.trim();
        const jps=Array.from(document.querySelectorAll('.sent-jp')).map(el=>el.value.trim());
        const kos=Array.from(document.querySelectorAll('.sent-ko')).map(el=>el.value.trim());
        if(!title || jps.join('')==='') return alert('제목과 본문은 필수입니다.');
        const artId=isEditMode?editingId:Date.now();
        const newArt={id:artId, title, titleKo, jp:jps.join('\n'), ko:kos.join('\n'), date:new Date().toLocaleDateString()};
        if(isEditMode) articles=articles.map(a=>a.id===editingId?newArt:a); else articles.unshift(newArt);
        vocabulary=vocabulary.filter(v=>v.articleId!==artId);
        document.querySelectorAll('.vocab-row-container').forEach(row=>{
            const w=row.querySelector('.voc-w').value.trim(); const m=row.querySelector('.voc-m').value.trim();
            const s=row.querySelector('.voc-s').value.trim(); const t=row.querySelector('.voc-t').value.trim();
            if(w) vocabulary.push({id:Date.now()+Math.random(), word:w, mean:m, sent:t?`${s} | ${t}`:s, articleId:artId});
        });
        localStorage.setItem('my_articles',JSON.stringify(articles)); localStorage.setItem('my_vocabulary',JSON.stringify(vocabulary));
        currentArticleId=artId; goMain(); selectArticle(artId);
    }

    function selectArticle(id) {
        currentArticleId=id; const art=articles.find(a=>a.id===id); renderArticles();
        const artVocab=vocabulary.filter(v=>v.articleId===id);
        let html=`<h2>${processJapaneseText(art.title)}</h2><p class="title-trans">${art.titleKo||''}</p>`;
        art.jp.split('\n').forEach((v,i)=>html+=`<div class="sentence-pair"><div class="viewer-jp">${processJapaneseText(v, artVocab)}</div><div class="viewer-ko">${art.ko.split('\n')[i]||''}</div></div>`);
        document.getElementById('viewer').innerHTML=html;
    }

    function renderArticles() {
        const list=document.getElementById('articleList');
        list.innerHTML=articles.map(a=>`<div class="list-item ${currentArticleId===a.id?'active':''}" onclick="selectArticle(${a.id})"><div class="title">${a.title.replace(/\[[^\]]+\]/g,'')}</div><div class="date">${a.date}</div><div class="list-item-btns"><button class="btn-sm-action" onclick="goEdit(${a.id})">✏️</button><button class="btn-sm-action" onclick="deleteArticle(${a.id},event)">🗑</button></div></div>`).join('');
    }

    function renderFullVocab() {
        const list=document.getElementById('fullVocabList');
        const sorted=[...vocabulary].sort((a,b)=>a.word.localeCompare(b.word,'ja'));
        document.getElementById('vocabCount').innerText=`(총 ${sorted.length}개)`;
        list.innerHTML=sorted.map(v=>{
            const parts=v.sent.split(' | ');
            const hasEx = parts[0].trim().length > 0;
            const exBtn = hasEx ? `<button class="btn-ex-pop" onclick="openExModal('${v.word}','${parts[0]}','${parts[1]||''}')">예문</button>` : '';
            return `<div class="vocab-card">${exBtn}<div class="vocab-word">${v.word}</div><div class="vocab-mean">${v.mean.replace(/\*/g,'')}</div></div>`
        }).join('');
    }

    function deleteArticle(id,e) { e.stopPropagation(); if(confirm('삭제하시겠습니까?')){ articles=articles.filter(a=>a.id!==id); vocabulary=vocabulary.filter(v=>v.articleId!==id); localStorage.setItem('my_articles',JSON.stringify(articles)); localStorage.setItem('my_vocabulary',JSON.stringify(vocabulary)); goMain(); }}
    window.onload=()=>{ goMain(); if(articles.length>0) selectArticle(articles[0].id); };
</script>
</body>
</html>
